name: Project Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    - name: Build
      shell: bash
      run: make all

    - name: Verify binary
      shell: bash
      run: |
        OUTPUT=$(./bin/pack-optimizer)
        if [ "$OUTPUT" != "Welcome to Pack Optimizer!" ]; then
          echo "ERROR: Output did not match expected 'Welcome to Pack Optimizer!'"
          echo "Program output: $OUTPUT"
          exit 1
        fi
        echo "Binary verified successfully."