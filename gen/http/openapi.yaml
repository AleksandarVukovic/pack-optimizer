                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: false
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: false
        description: calculate_internal_server_error_response_body result type (default view)
        example:
            fault: true
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: false
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    OptimizerCalculateResponseBody:
        title: OptimizerCalculateResponseBody
        type: object
        properties:
            packs:
                type: array
                items:
                    $ref: '#/definitions/Pack'
                description: Optimal pack combinations (pack size -> quantity)
                example:
                    - quantity: 1609558464246327244
                      size: 5614756764895872828
                    - quantity: 1609558464246327244
                      size: 5614756764895872828
                    - quantity: 1609558464246327244
                      size: 5614756764895872828
        example:
            packs:
                - quantity: 1609558464246327244
                  size: 5614756764895872828
                - quantity: 1609558464246327244
