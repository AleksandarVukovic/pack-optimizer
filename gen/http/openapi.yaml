swagger: "2.0"
info:
    title: Pack Optimizer
    description: Service to calculate optimal pack combinations for a given number of items
    version: 0.0.1
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /health:
        get:
            tags:
                - optimizer
            summary: health optimizer
            description: Returns the health status of the service.
            operationId: optimizer#health
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/OptimizerHealthResponseBody'
                        required:
                            - status
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/OptimizerHealthInternalServerErrorResponseBody'
            schemes:
                - http
    /packs/calculate:
        get:
            tags:
                - optimizer
            summary: calculate optimizer
            description: Calculate optimal pack combinations for a given number of items.
            operationId: optimizer#calculate
            parameters:
                - name: quantity
                  in: query
                  description: Total number of items to pack
                  required: true
                  type: integer
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/OptimizerCalculateResponseBody'
                        required:
                            - packs
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/OptimizerCalculateBadRequestResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/OptimizerCalculateInternalServerErrorResponseBody'
            schemes:
                - http
    /packs/sizes:
        get:
            tags:
                - optimizer
            summary: getPackSizes optimizer
            description: Get the current pack sizes.
            operationId: optimizer#getPackSizes
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/OptimizerGetPackSizesResponseBody'
                        required:
                            - sizes
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/OptimizerGetPackSizesInternalServerErrorResponseBody'
            schemes:
                - http
        put:
            tags:
                - optimizer
            summary: updatePackSizes optimizer
            description: Update the pack sizes.
            operationId: optimizer#updatePackSizes
            parameters:
                - name: UpdatePackSizesRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/OptimizerUpdatePackSizesRequestBody'
                    required:
                        - sizes
            responses:
                "204":
                    description: No Content response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/OptimizerUpdatePackSizesBadRequestResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/OptimizerUpdatePackSizesInternalServerErrorResponseBody'
            schemes:
                - http
definitions:
    OptimizerCalculateBadRequestResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: true
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: false
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: calculate_bad_request_response_body result type (default view)
        example:
            fault: true
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: true
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    OptimizerCalculateInternalServerErrorResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
