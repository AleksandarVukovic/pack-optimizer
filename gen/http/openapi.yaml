    OptimizerGetPackSizesResponseBody:
        title: OptimizerGetPackSizesResponseBody
        type: object
        properties:
            sizes:
                type: array
                items:
                    type: integer
                    example: 4633574668665543999
                    format: int64
                description: Current pack sizes
                example:
                    - 250
                    - 500
                    - 1000
        example:
            sizes:
                - 250
