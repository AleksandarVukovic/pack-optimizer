<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Packs Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background-color: #f2f2f2; }
    input[type="number"] { width: 100px; }
    button { margin-top: 10px; padding: 8px 12px; }
    .remove-btn { margin-left: 10px; color: red; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Packs Calculator</h1>

  <!-- Pack Sizes Table -->
  <table id="packSizesTable">
    <thead>
      <tr><th>Pack Sizes</th><th>Action</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="addPackSizeRow()">Add Pack Size</button>
  <button onclick="updatePackSizes()">Update Pack Sizes</button>

  <h2>Calculate packs</h2>
  <label for="items">Items:</label>
  <input type="number" id="items" min="1">
  <button onclick="calculatePacks()">Calculate</button>

  <!-- Calculation Result Table -->
  <table id="calculationTable">
    <thead>
      <tr><th>Pack</th><th>Quantity</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadPackSizes() {
      try {
        const response = await fetch('https://pack-optimizer-go-3f0f2ae79338.herokuapp.com/packs/sizes');
        const resp = await response.json();
        if (!response.ok) {
          alert("ERROR: " + (resp.message || 'Some error occurred while loading pack sizes.'));
          return;
        }
        const tbody = document.querySelector('#packSizesTable tbody');
        tbody.innerHTML = '';
        resp.sizes.forEach(size => {
          addPackSizeRow(size);
        });
      } catch (err) {
        alert("ERROR: Some error occurred while loading pack sizes.");
      }
    }

    function addPackSizeRow(value = '') {
      const tbody = document.querySelector('#packSizesTable tbody');
      const row = document.createElement('tr');

      const cellInput = document.createElement('td');
      const input = document.createElement('input');
      input.type = 'number';
      input.value = value;
      cellInput.appendChild(input);

      const cellAction = document.createElement('td');
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'remove-btn';
      removeBtn.onclick = () => row.remove();
      cellAction.appendChild(removeBtn);

      row.appendChild(cellInput);
      row.appendChild(cellAction);
      tbody.appendChild(row);
    }

    async function updatePackSizes() {
      try {
        const inputs = document.querySelectorAll('#packSizesTable tbody input');
        const sizes = Array.from(inputs)
          .map(input => parseInt(input.value, 10))
          .filter(val => !isNaN(val));
        const response = await fetch('https://pack-optimizer-go-3f0f2ae79338.herokuapp.com/packs/sizes', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({sizes})
        });
        const resp = await response.json();
        if (!response.ok) {
          alert("ERROR: " + (resp.message || 'Some error occurred while updating pack sizes.'));
          return;
        }
        alert('Pack sizes updated!');
      } catch (err) {
        alert("ERROR: Some error occurred while updating pack sizes.");
      }
    }

    async function calculatePacks() {
      try {
        const items = document.getElementById('items').value;
        const response = await fetch(`https://pack-optimizer-go-3f0f2ae79338.herokuapp.com/packs/calculate?quantity=${items}`);
        const result = await response.json();
        if (!response.ok) {
          alert("ERROR: " + (result.message || 'Some error occurred while calculating packs.'));
          return;
        }
        const tbody = document.querySelector('#calculationTable tbody');
        tbody.innerHTML = '';
        result.packs.forEach(entry => {
          const row = document.createElement('tr');
          const packCell = document.createElement('td');
          const qtyCell = document.createElement('td');
          packCell.textContent = entry.size;
          qtyCell.textContent = entry.quantity;
          row.appendChild(packCell);
          row.appendChild(qtyCell);
          tbody.appendChild(row);
        });
      } catch (err) {
        alert("ERROR: Some error occurred while calculating packs.");
      }
    }

    // Load pack sizes on page load
    window.onload = loadPackSizes;
  </script>
</body>
</html>
